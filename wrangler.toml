# wrangler.toml
# Cloudflare Pages/Workers（wrangler）部署配置
#
# 说明：
# - 这是一个纯前端静态站点（Vite build 输出 dist/）
# - 推荐用 Cloudflare Pages；但你现在用的是 `npx wrangler deploy`（Workers Assets）也可以。

name = "ai-chat-deom"
compatibility_date = "2026-03-17"

# 静态资源目录（Vite build 输出）
assets = { directory = "dist" }

# 可选：若未来需要 SPA 路由回退，可在这里配置（hash 路由一般不需要）
# [routes]
# include = ["/*"]
